<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой сайт</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom right, #3b82f6, #9333ea);
      color: white;
      text-align: center;
    }

    .menu button {
      margin: 5px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .box {
      margin-top: 30px;
    }

    input {
      padding: 8px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<h1>🚀 Мой сайт</h1>

<div class="menu">
  <button onclick="show('demo')">Демо</button>
  <button onclick="show('text')">Текст</button>
  <button onclick="show('game')">Угадай</button>
  <button onclick="show('rps')">RPS</button>
</div>

<div id="content" class="box"></div>

<script>
let count = 0;
let number = Math.floor(Math.random() * 10) + 1;

function show(type) {
  if (type === 'demo') {
    document.getElementById("content").innerHTML = `
      <button onclick="clickMe()">Нажми (${count})</button>
    `;
  }

  if (type === 'text') {
    document.getElementById("content").innerHTML = `
      <input oninput="changeText(this.value)" placeholder="Напиши что-нибудь">
      <p id="text"></p>
    `;
  }

  if (type === 'game') {
    document.getElementById("content").innerHTML = `
      <h3>🎮 Угадай число (1–10)</h3>
      <input id="guess" type="number">
      <br><br>
      <button onclick="check()">Проверить</button>
      <button onclick="resetGame()">Заново</button>
      <p id="result"></p>
    `;
  }

  if (type === 'rps') {
    document.getElementById("content").innerHTML = `
      <h3>✊ Камень / ✌️ Ножницы / ✋ Бумага</h3>
      <button onclick="play('камень')">✊</button>
      <button onclick="play('ножницы')">✌️</button>
      <button onclick="play('бумага')">✋</button>
      <br><br>
      <button onclick="resetRPS()">Заново</button>
      <p id="rpsResult"></p>
    `;
  }
}

function clickMe() {
  count++;
  document.querySelector("#content button").innerText = "Нажми (" + count + ")";
}

function changeText(value) {
  document.getElementById("text").innerText = "Ты написал: " + value;
}

function check() {
  let guess = document.getElementById("guess").value;

  if (guess == number) {
    document.getElementById("result").innerText = "🎉 Угадал!";
  } else if (guess > number) {
    document.getElementById("result").innerText = "⬇️ Меньше";
  } else {
    document.getElementById("result").innerText = "⬆️ Больше";
  }
}

function resetGame() {
  number = Math.floor(Math.random() * 10) + 1;
  document.getElementById("result").innerText = "";
  document.getElementById("guess").value = "";
}

function play(player) {
  const choices = ['камень', 'ножницы', 'бумага'];
  const bot = choices[Math.floor(Math.random() * 3)];

  let result = "";

  if (player === bot) {
    result = "🤝 Ничья!";
  } else if (
    (player === 'камень' && bot === 'ножницы') ||
    (player === 'ножницы' && bot === 'бумага') ||
    (player === 'бумага' && bot === 'камень')
  ) {
    result = "🎉 Ты выиграл!";
  } else {
    result = "😢 Ты проиграл!";
  }

  document.getElementById("rpsResult").innerText =
    `Ты: ${player} | Бот: ${bot} → ${result}`;
}

function resetRPS() {
  document.getElementById("rpsResult").innerText = "";
}
</script>

</body>
</html>
