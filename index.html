<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Игра</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom right, #22c55e, #16a34a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    input, button {
      margin-top: 10px;
      padding: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎮 Угадай число (1–10)</h2>

  <input id="guess" type="number" placeholder="Введи число">
  <br>
  <button onclick="check()">Проверить</button>

  <p id="result"></p>
</div>

<script>
let number = Math.floor(Math.random() * 10) + 1;

function check() {
  let guess = document.getElementById("guess").value;

  if (guess == number) {
    document.getElementById("result").innerText = "🎉 Угадал!";
  } else if (guess > number) {
    document.getElementById("result").innerText = "⬇️ Меньше";
  } else {
    document.getElementById("result").innerText = "⬆️ Больше";
  }
}
</script>

</body>
</html>
